tags:
  - Auth
summary: Reset user password
operationId: resetPassword
description: 'Resets the user password using a valid token and new password.'
security: []
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        required:
          - token
          - password
        properties:
          token:
            description: 'Password reset token from email'
            type: string
            example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
          password:
            description: 'New password (6-15 characters)'
            type: string
            minLength: 6
            maxLength: 15
            example: 'NewP@ss123'
responses:
  '200':
    description: Password has been successfully reset
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: 'Password has been successfully reset.'
            data:
              type: object
              description: Empty object
              example: {}
  '401':
    description: Token is expired or invalid
  '404':
    description: User not found
