tags:
  - Contacts
summary: Get list of contacts
operationId: getContacts
description: 'Retrieve a list of contacts with optional filters, sorting, and pagination'
security:
  - bearerAuth: []
parameters:
  - in: query
    name: page
    description: Page number
    schema:
      type: integer
      minimum: 1
      default: 1
    example: 1
  - in: query
    name: perPage
    description: Number of contacts per page
    schema:
      type: integer
      minimum: 1
      maximum: 50
      default: 10
    example: 10
  - in: query
    name: sortBy
    description: Field to sort
    schema:
      type: string
      enum:
        - '_id'
        - 'name'
        - 'phoneNumber'
        - 'email'
        - 'isFavourite'
        - 'contactType'
      default: '_id'
    example: 'name'
  - in: query
    name: sortOrder
    description: Sort order
    schema:
      type: string
      enum:
        - 'asc'
        - 'desc'
      default: 'asc'
    example: 'asc'
  - in: query
    name: type
    description: Filter by contact type
    schema:
      type: string
      enum:
        - 'work'
        - 'home'
        - 'personal'
    example: 'work'
  - in: query
    name: isFavourite
    description: Filter by favourite status
    schema:
      type: boolean
    example: true
  - in: query
    name: name
    description: Filter by contact name (min 3, max 20 chars)
    schema:
      type: string
      minLength: 3
      maxLength: 20
    example: 'John'
  - in: query
    name: email
    description: Filter by contact email
    schema:
      type: string
      format: email
    example: 'test@example.com'
  - in: query
    name: phoneNumber
    description: Filter by phone number (6-15 digits)
    schema:
      type: string
      pattern: '^\d{6,15}$'
    example: '380123456789'
responses:
  '200':
    description: Successfully retrieved contacts
    content:
      application/json:
        schema:
          type: object
          required:
            - status
            - message
            - data
          properties:
            status:
              type: integer
              example: 200
            message:
              type: string
              example: Successfully found contacts
            data:
              type: object
              required:
                - data
                - page
                - perPage
                - totalItems
                - totalPages
                - hasNextPage
                - hasPreviousPage
              properties:
                data:
                  type: array
                  items:
                    $ref: '../../components/schemas/contact.yaml'
                page:
                  type: number
                  example: 1
                perPage:
                  type: number
                  example: 10
                totalItems:
                  type: number
                  example: 100
                totalPages:
                  type: number
                  example: 10
                hasNextPage:
                  type: boolean
                  example: true
                hasPreviousPage:
                  type: boolean
                  example: false
  '401':
    $ref: '../../components/responses/401.yaml'
