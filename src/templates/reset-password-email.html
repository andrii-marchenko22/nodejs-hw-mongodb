<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Password Reset</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
    "
  >
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #f4f4f4; padding: 20px 0"
    >
      <tr>
        <td align="center">
          <table
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="
              background-color: #ffffff;
              border-radius: 10px;
              overflow: hidden;
              box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            "
          >
            <tr>
              <td
                style="
                  background-color: #4a90e2;
                  padding: 20px;
                  text-align: center;
                  color: #ffffff;
                  font-size: 24px;
                  font-weight: bold;
                "
              >
                Reset Your Password
              </td>
            </tr>
            <tr>
              <td
                style="
                  padding: 30px;
                  color: #333333;
                  font-size: 16px;
                  line-height: 1.5;
                "
              >
                <p>Hello! {{USERNAME}},</p>
                <p>
                  We received a request to reset your password. Click the button
                  below to set a new password. This link will expire in
                  <strong>15 minutes</strong>.
                </p>
                <p style="text-align: center; margin: 30px 0">
                  <a
                    href="{{RESET_LINK}}"
                    target="_blank"
                    style="
                      background-color: #4a90e2;
                      color: #ffffff;
                      text-decoration: none;
                      padding: 15px 25px;
                      border-radius: 5px;
                      font-weight: bold;
                      display: inline-block;
                    "
                  >
                    Reset Password
                  </a>
                </p>
                <p>
                  If you did not request a password reset, you can safely ignore
                  this email.
                </p>
              </td>
            </tr>
            <tr>
              <td
                style="
                  background-color: #f4f4f4;
                  padding: 20px;
                  text-align: center;
                  font-size: 12px;
                  color: #777777;
                "
              >
                &copy; 2025 MyApp. All rights reserved.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
